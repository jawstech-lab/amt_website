<div class="container mt-5 mb-5">
  
  <div class="d-flex justify-content-center align-items-center mb-5 gap-3 flex-wrap">
    <h2 class="titulo-secao mb-0">NOSSOS <span class="text-primary">CTs</span></h2>
    <button class="btn btn-outline-warning rounded-pill shadow" (click)="abrirMapa()">
      <i class="bi bi-geo-alt-fill me-1"></i> CTs perto de mim
    </button>
  </div>

  <div class="row g-4">
    <div class="col-12" *ngFor="let local of locais">
      <div class="local-card shadow-lg d-flex flex-column flex-lg-row">
        
        <div class="local-img-container">
          <img [src]="local.imagemUrl" [alt]="local.nome" class="local-img">
        </div>

        <div class="local-info p-3 d-flex flex-column justify-content-center">
          <h3 class="text-primary fw-bold text-uppercase mb-3">{{ local.nome }}</h3>
          <p class="text-light fs-6 mb-2 d-flex align-items-start">
            <i class="bi bi-geo-alt-fill text-warning me-2 mt-1"></i> 
            <span>{{ local.endereco }}</span>
          </p>
         <p class="text-light fs-6 mb-2 d-flex align-items-start" *ngIf="local.contato">
            <i class="bi bi-whatsapp text-warning me-2 mt-1"></i> 
            <span>{{ local.contato }}</span>
          </p>
          
          <p class="text-light fs-6 mb-2 d-flex align-items-start" *ngIf="local.treinador">
            <i class="bi bi-person-fill text-warning me-2 mt-1"></i> 
            <span class="text-warning fw-bold">Treinador: {{ local.treinador }}</span>
          </p>

          <div class="text-light mb-4 d-flex align-items-start">
            <i class="bi bi-clock-fill text-warning me-2 mt-1"></i> 
            <div [innerHTML]="local.horarios"></div>
          </div>
          <a [href]="local.linkDireto" target="_blank" class="btn btn-outline-warning align-self-start mt-auto">
            <i class="bi bi-map-fill me-1"></i> Abrir no Maps
          </a>
        </div>

        <div class="local-video-container" *ngIf="local.videoUrl">
          <video [src]="local.videoUrl" class="local-video" controls preload="metadata"></video>
        </div>

      </div>
    </div>
  </div>
  
  <div class="mapa-overlay" *ngIf="mostrarMapa" (click)="fecharMapa()">
    <div class="mapa-modal shadow-lg" (click)="$event.stopPropagation()">
      <button class="btn-fechar-mapa" (click)="fecharMapa()">×</button>
      <h4 class="text-center text-primary mb-4 text-uppercase fw-bold">Unidades Próximas</h4>
      
      <div class="mapa-layout-duplo">
        
        <div class="mapa-sidebar pe-2">
          
          <div class="sidebar-item" 
               *ngFor="let local of locais" 
               [class.ativo]="localSelecionado === local"
               (click)="selecionarLocalDaLista(local)">
            
            <div class="sidebar-header">
              <img [src]="local.imagemUrl" class="sidebar-img">
              <span class="sidebar-nome">{{ local.nome }}</span>
            </div>

            <div class="sidebar-detalhes mt-3" *ngIf="localSelecionado === local">
              
              <p class="text-light small mb-2 d-flex align-items-start">
                <i class="bi bi-geo-alt-fill text-warning me-2 mt-1"></i> 
                <span>{{ local.endereco }}</span>
              </p>
              
              <p class="text-light small mb-2 d-flex align-items-start" *ngIf="local.contato">
                <i class="bi bi-whatsapp text-warning me-2 mt-1"></i> 
                <span>{{ local.contato }}</span>
              </p>
              
              <div class="text-light small mb-3 d-flex align-items-start">
                <i class="bi bi-clock-fill text-warning me-2 mt-1"></i> 
                <div [innerHTML]="local.horarios"></div>
              </div>

              <a [href]="local.linkDireto" target="_blank" class="btn btn-sm btn-outline-warning w-100">
                Traçar Rota no Maps
              </a>
            </div>

          </div>

        </div>

        <div id="mapa-cts" class="mapa-container-flex"></div>

      </div>
    </div>
  </div>

</div>
