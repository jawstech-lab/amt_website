<!-- ═══════════ LOCAIS DE TREINO ═══════════ -->
<section class="locais-section">
  <div class="wrap">

    <div class="locais-head">
      <div>
        <div class="section-eyebrow"><span>004 · Onde Treinar</span></div>
        <h2 class="locais-title">
          <span class="word-white">Locais de</span>
          <em class="word-red">Treino</em>
        </h2>
      </div>
      <button class="btn-ghost" (click)="abrirMapa()">
        Ver no Mapa <span class="btn-arrow">→</span>
      </button>
    </div>

    <div class="locais-grid">
      <div class="local-card" *ngFor="let local of locais; let i = index">
        <div class="local-card-num">/ {{ padNum(i + 1) }} — {{ local.cidade }}</div>
        <div class="local-card-name">{{ local.nome }}</div>
        <div class="local-card-meta">
          <span>{{ local.endereco }}</span>
          <span *ngIf="local.treinador">Treinador: <strong>{{ local.treinador }}</strong></span>
        </div>
        <div class="local-card-horarios">
          <div class="horario-row" *ngFor="let h of local.horarios">
            <span class="dia">{{ h.dia }}</span>
            <span class="horas">{{ h.horas }}</span>
          </div>
        </div>
        <div class="local-card-cta">
          <a [href]="local.linkDireto" target="_blank">Abrir no Maps →</a>
          <a (click)="scrollParaContato()">Visitar →</a>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- ═══════════ MAP MODAL ═══════════ -->
<dialog #mapaDialog class="modal-nativo" (click)="fecharAoClicarFora($event)">
  <div class="mapa-modal" *ngIf="mostrarMapa" (click)="$event.stopPropagation()">
    <button class="btn-fechar-mapa" (click)="fecharMapa()">×</button>
    <p class="mapa-titulo">Unidades AMT</p>
    <div class="mapa-layout-duplo">
      <div class="mapa-sidebar">
        <div class="sidebar-item" *ngFor="let local of locais"
             [class.ativo]="localSelecionado === local"
             (click)="selecionarLocalDaLista(local)">
          <div class="sidebar-nome">{{ local.nome }}</div>
          <div class="sidebar-detalhes" *ngIf="localSelecionado === local">
            <p>{{ local.endereco }}</p>
            <a [href]="local.linkDireto" target="_blank" class="btn-rota">Traçar Rota →</a>
          </div>
        </div>
      </div>
      <div id="mapa-cts" class="mapa-container-flex"></div>
    </div>
  </div>
</dialog>
