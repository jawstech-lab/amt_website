<div class="container mt-5 mb-5">
  <h2 class="titulo-secao text-center mb-5">ENTRE EM <span class="text-primary">CONTATO</span></h2>

  <div class="row justify-content-center">
    <div class="col-lg-6">
      <form [formGroup]="contatoForm" (ngSubmit)="onSubmit()" class="contato-form">
        <div class="mb-3">
          <label for="nome" class="form-label text-light">Nome *</label>
          <input type="text" class="form-control" id="nome" formControlName="nome" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label text-light">Email *</label>
          <input type="email" class="form-control" id="email" formControlName="email" required>
        </div>

        <div class="mb-3">
          <label for="telefone" class="form-label text-light">Telefone *</label>
          <input type="tel" class="form-control" id="telefone" formControlName="telefone" required>
        </div>

        <div class="mb-3">
          <label for="mensagem" class="form-label text-light">Mensagem *</label>
          <textarea class="form-control" id="mensagem" rows="4" formControlName="mensagem" required></textarea>
        </div>

        <button type="submit" class="btn btn-outline-warning w-100" [disabled]="!contatoForm.valid">
          <i class="bi bi-send me-2"></i> Enviar Mensagem
        </button>
      </form>
    </div>

    <div class="col-lg-4 mt-4 mt-lg-0">
      <div class="contato-info text-center">
        <h4 class="text-primary mb-4">Conecte-se Conosco</h4>
        
        <div class="social-icons mb-4">
          <button class="btn btn-outline-primary me-3" (click)="abrirInstagram()" title="Instagram">
            <img src="imagens/instagram.png" alt="Instagram" class="social-icon-img">
          </button>
          <button class="btn btn-outline-success" (click)="abrirWhatsApp()" title="WhatsApp">
            <img src="imagens/whatsapp.png" alt="WhatsApp" class="social-icon-img">
          </button>
        </div>

        <p class="text-light">
          Siga-nos no Instagram para acompanhar nossas atividades e eventos.<br>
          Ou envie uma mensagem direta pelo WhatsApp para dúvidas rápidas.
        </p>
      </div>
    </div>
  </div>
</div>
