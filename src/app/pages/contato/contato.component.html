<!-- ═══════════ CONTATO ═══════════ -->
<section class="contato-section">
  <div class="wrap">
    <div class="contato-grid">

      <!-- Left: info + channels -->
      <div class="contato-left">
        <div class="section-eyebrow"><span>006 · Vem Treinar</span></div>
        <h2 class="contato-title">
          <span class="word-white">Entre em</span>
          <em class="word-red">Contato</em>
        </h2>
        <p class="contato-sub">
          Tire suas dúvidas, conheça os horários e locais ou nos chame
          no WhatsApp. Estamos sempre prontos para receber você.
        </p>

        <div class="contato-channels">
          <a class="channel" href="https://www.instagram.com/amt_alliancemuaythai" target="_blank">
            <div class="channel-icon">IG</div>
            <div class="channel-name">
              &#64;amt.muaythai
              <small>Instagram · acompanhe</small>
            </div>
            <div class="channel-go">Seguir →</div>
          </a>
          <a class="channel" href="https://wa.me/5512991016632" target="_blank">
            <div class="channel-icon">WA</div>
            <div class="channel-name">
              +55 12 99101-6632
              <small>WhatsApp · resposta rápida</small>
            </div>
            <div class="channel-go">Chamar →</div>
          </a>
        </div>
      </div>

      <!-- Right: form -->
      <form class="contato-form" [formGroup]="contatoForm" (ngSubmit)="onSubmit()">
        <div class="contato-form-title">/ Formulário Rápido</div>

        <div class="field">
          <label>Nome</label>
          <input type="text" formControlName="nome" placeholder="Como podemos te chamar" />
        </div>
        <div class="field">
          <label>Telefone / WhatsApp</label>
          <input type="tel" formControlName="telefone" placeholder="(12) 9 8888-7777" />
        </div>
        <div class="field">
          <label>Local de Interesse</label>
          <input type="text" formControlName="localInteresse" placeholder="SJC Centro / Aquarius / Caraguá..." />
        </div>
        <div class="field">
          <label>Mensagem</label>
          <textarea formControlName="mensagem" rows="3" placeholder="Conte para nós como podemos ajudar"></textarea>
        </div>

        <button type="submit" class="contato-submit" [disabled]="!contatoForm.valid || enviando">
          {{ enviando ? 'Enviando...' : 'Enviar Mensagem →' }}
        </button>

        <div *ngIf="statusMensagem" class="status-msg" [class.sucesso]="!statusErro" [class.erro]="statusErro">
          {{ statusMensagem }}
        </div>
      </form>

    </div>
  </div>
</section>
